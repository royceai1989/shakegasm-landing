<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded square with brand gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e91e63"/>
      <stop offset="1" stop-color="#9c27b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Bold S wordmark, slightly italic for motion -->
  <g transform="translate(0,0)">
    <path d="M44 19c0-4-4-7-12-7s-12 3-12 9c0 6 6 7 12 8s12 2 12 8c0 6-6 9-13 9-7 0-13-3-13-8"
          fill="none"
          stroke="#fff"
          stroke-width="6.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
