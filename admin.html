<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShakeGasm — Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; max-width: 1200px; margin: 0 auto; line-height: 1.4; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 700; }
  h1 .badge { display: inline-block; background: #e91e63; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; vertical-align: middle; margin-left: 8px; }
  .meta { font-size: 12px; color: rgba(255,255,255,0.45); }
  .row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 140px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .stat-num { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .stat-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; }
  thead { background: rgba(255,255,255,0.06); }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
  th { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 600; cursor: pointer; user-select: none; }
  th[data-sort]::after { content: ' ⇅'; color: rgba(255,255,255,0.2); font-size: 10px; }
  th.sorted::after { content: ' ↓'; color: #e91e63; }
  th.sorted.asc::after { content: ' ↑'; }
  td .pill { display: inline-block; background: rgba(74,222,128,0.15); color: #4ade80; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin-right: 3px; }
  td .pill.admin { background: rgba(233,30,99,0.18); color: #f472b6; }
  td .pill.bundle { background: rgba(245,158,11,0.18); color: #fbbf24; }
  td.email { font-weight: 500; }
  td.dim { color: rgba(255,255,255,0.5); }
  .login-box { max-width: 360px; margin: 80px auto; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 28px; }
  .login-box h2 { font-size: 18px; margin-bottom: 16px; }
  .login-box input { width: 100%; padding: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-size: 14px; margin-bottom: 8px; outline: none; font-family: inherit; }
  .login-box input:focus { border-color: #e91e63; }
  .btn { width: 100%; padding: 12px; background: #e91e63; border: none; color: #fff; font-weight: 600; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
  .btn.secondary { background: rgba(255,255,255,0.08); margin-top: 8px; }
  .err { color: #ff6b88; font-size: 12px; margin-top: 6px; min-height: 16px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .toolbar input { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
  .toolbar input:focus { border-color: #e91e63; }
  .toolbar button { padding: 8px 14px; background: rgba(255,255,255,0.08); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .empty { padding: 40px; text-align: center; color: rgba(255,255,255,0.4); }
  .scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .small-link { font-size: 12px; color: rgba(255,255,255,0.5); background: transparent; border: none; cursor: pointer; padding: 4px 8px; }
  .small-link:hover { color: #fff; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .tab { padding: 10px 16px; background: transparent; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; }
  .tab.active { color: #fff; border-bottom-color: #e91e63; }
  td .row-actions { display: flex; gap: 4px; }
  td .row-actions button { padding: 4px 8px; font-size: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; cursor: pointer; font-family: inherit; }
  td .row-actions button.danger { color: #ff6b88; border-color: rgba(255,107,136,0.3); }
  .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-back.show { display: flex; }
  .modal-card { background: #131313; border-radius: 14px; padding: 22px; max-width: 380px; width: 100%; }
  .modal-card h3 { font-size: 16px; margin-bottom: 14px; }
  .modal-card .field { margin-bottom: 10px; }
  .modal-card label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .modal-card select, .modal-card input { width: 100%; padding: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .modal-actions button { padding: 8px 14px; font-size: 12px; background: rgba(255,255,255,0.08); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; }
  .modal-actions button.primary { background: #e91e63; }
  /* Detail drawer */
  .drawer-back { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
  .drawer-back.show { display: block; }
  .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 480px; max-width: 100vw; background: #0e0e0e; border-left: 1px solid rgba(255,255,255,0.08); z-index: 91; transform: translateX(100%); transition: transform 0.25s ease; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .drawer.show { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; gap: 12px; padding: 20px 22px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; background: #0e0e0e; z-index: 1; }
  .drawer-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #e91e63, #9c27b0); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .drawer-id { flex: 1; min-width: 0; }
  .drawer-id .e { font-size: 14px; font-weight: 600; word-break: break-all; }
  .drawer-id .n { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .drawer-close { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 4px 8px; line-height: 1; }
  .drawer-body { padding: 18px 22px 28px; }
  .drawer-section { margin-bottom: 22px; }
  .drawer-section-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 10px; font-weight: 600; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-cell { background: rgba(255,255,255,0.04); padding: 10px 12px; border-radius: 8px; }
  .stat-cell .l { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
  .stat-cell .v { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .pack-rows { display: flex; flex-direction: column; gap: 6px; }
  .pack-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .pack-row .name { flex: 1; }
  .pack-row .src { font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .grant-row { display: flex; gap: 6px; margin-top: 6px; }
  .grant-row select { flex: 1; padding: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-size: 12px; outline: none; font-family: inherit; }
  .grant-row button { padding: 8px 12px; background: #e91e63; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .action-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .action-btns button { padding: 8px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .action-btns button:hover { background: rgba(255,255,255,0.1); }
  .action-btns button.danger { color: #ff6b88; border-color: rgba(255,107,136,0.3); }
  .row-clickable { cursor: pointer; transition: background 0.1s; }
  .row-clickable:hover { background: rgba(255,255,255,0.04); }
  .verify-screen { max-width: 360px; margin: 100px auto; text-align: center; }
  .verify-screen .pulse { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e91e63; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .audit-row { background: rgba(255,255,255,0.03); padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 12px; }
  .audit-row .a-when { color: rgba(255,255,255,0.4); font-size: 10px; }
  .audit-row .a-action { color: #e91e63; font-weight: 600; }
  .audit-row .a-actor { color: rgba(255,255,255,0.7); }
  .audit-row .a-details { color: rgba(255,255,255,0.5); margin-top: 4px; font-family: ui-monospace,Consolas,monospace; font-size: 11px; word-break: break-all; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="verifyScreen" style="display:none" class="verify-screen">
  <div class="pulse"></div>
  <div style="color:rgba(255,255,255,0.6);font-size:14px">Verifying access…</div>
</div>

<div id="loginScreen" style="display:none">
  <div class="login-box">
    <h2>🔐 Admin Sign-in</h2>
    <input id="email" type="email" placeholder="admin@test.com" autocomplete="email">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <button class="btn" id="signInBtn">Sign in</button>
    <button class="btn secondary" onclick="location.href='/index.html'">← Back to app</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div id="adminScreen" style="display:none">
  <header>
    <div>
      <h1>ShakeGasm Admin <span class="badge">v1</span></h1>
      <div class="meta" id="metaLine"></div>
    </div>
    <div>
      <button class="small-link" onclick="location.href='/index.html'">App ↗</button>
      <button class="small-link" id="signOutBtn">Sign out</button>
    </div>
  </header>

  <div class="row" id="statsRow"></div>

  <div class="tabs">
    <button class="tab active" data-tab="users">Users</button>
    <button class="tab" data-tab="audit">Audit log</button>
  </div>

  <div id="tab-users">
    <div class="toolbar">
      <input id="search" placeholder="Search by email…">
      <button id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="scroll">
      <table id="userTable">
        <thead>
          <tr>
            <th data-sort="email">Email</th>
            <th data-sort="last_name">Name</th>
            <th data-sort="created_at">Joined</th>
            <th data-sort="last_active_at">Last active</th>
            <th data-sort="revenue_cents">Spent</th>
            <th data-sort="pack_count">Packs</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="userTbody"></tbody>
      </table>
    </div>
    <div id="emptyMsg" class="empty" style="display:none">No users yet.</div>
  </div>

  <div id="tab-audit" style="display:none">
    <div class="toolbar"><div style="font-size:12px;color:rgba(255,255,255,0.5);flex:1">Last 200 actions</div><button id="refreshAuditBtn">↻ Refresh</button></div>
    <div id="auditList"></div>
  </div>
</div>

<!-- User detail drawer -->
<div class="drawer-back" id="drawerBack"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-avatar" id="drawerAvatar">?</div>
    <div class="drawer-id">
      <div class="e" id="drawerEmail"></div>
      <div class="n" id="drawerName"></div>
    </div>
    <button class="drawer-close" id="drawerClose">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- Edit name modal -->
<div class="modal-back" id="nameModal">
  <div class="modal-card">
    <h3>Edit user name</h3>
    <div class="field"><label>User</label><div id="nameTarget" style="font-size:13px;color:rgba(255,255,255,0.7)"></div></div>
    <div class="field"><label>First name</label><input id="nameFirst" type="text" autocomplete="off"></div>
    <div class="field"><label>Last name</label><input id="nameLast" type="text" autocomplete="off"></div>
    <div class="modal-actions">
      <button id="nameCancel">Cancel</button>
      <button class="primary" id="nameSubmit">Save</button>
    </div>
  </div>
</div>

<!-- Reset password result modal -->
<div class="modal-back" id="resetModal">
  <div class="modal-card">
    <h3>Temporary password</h3>
    <p style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:10px">
      Share this with the user. They should sign in and change it immediately.
    </p>
    <div class="field"><label>User</label><div id="resetTarget" style="font-size:13px;color:rgba(255,255,255,0.7)"></div></div>
    <div class="field"><label>Password</label>
      <input id="resetPwField" type="text" readonly style="font-family:ui-monospace,Consolas,monospace;font-size:14px">
    </div>
    <div class="modal-actions">
      <button id="resetCopy">Copy</button>
      <button class="primary" id="resetClose">Done</button>
    </div>
  </div>
</div>

<!-- Manual grant/revoke modal -->
<div class="modal-back" id="grantModal">
  <div class="modal-card">
    <h3 id="grantModalTitle">Manage user packs</h3>
    <div class="field"><label>User</label><div id="grantTarget" style="font-size:13px;color:rgba(255,255,255,0.7)"></div></div>
    <div class="field">
      <label>Voice pack</label>
      <select id="grantPack"></select>
    </div>
    <div class="field">
      <label>Source</label>
      <select id="grantSource">
        <option value="manual">manual</option>
        <option value="promo">promo</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="grantCancel">Cancel</button>
      <button class="primary" id="grantSubmit">Grant</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xpypbboawjxwmlfyuzqa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_dfs-Aulhl8YDYD7KG4VIjA_WpgV348o';
// Use the same storage key as the main app so signing in on either page works on both
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const $ = id => document.getElementById(id);
const fmtRel = (ts) => {
  if (!ts) return '—';
  const d = new Date(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)   return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
};
const fmtTime = (sec) => {
  if (!sec) return '0m';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
};
const fmtCents = (c) => '$' + (c/100).toFixed(2);

let allUsers = [];
let allPacks = [];
let auditLog = [];
let sortKey = 'last_active_at';
let sortAsc = false;
let currentTab = 'users';

// Safe DOM helpers — no innerHTML for user-controlled values
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'text') node.textContent = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (v != null) node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

async function ensureAdmin() {
  showVerify();
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { showLogin(); return false; }
  const { data, error } = await sb.rpc('is_admin');
  if (error || !data) {
    showLogin('You are signed in as ' + (session.user.email || 'a user') + ' but that account is not an admin.');
    return false;
  }
  return true;
}

function showVerify() {
  $('verifyScreen').style.display = '';
  $('loginScreen').style.display = 'none';
  $('adminScreen').style.display = 'none';
}
function showLogin(msg) {
  $('verifyScreen').style.display = 'none';
  $('loginScreen').style.display = '';
  $('adminScreen').style.display = 'none';
  if (msg) $('err').textContent = msg;
  // Pre-fill email if there's a session
  sb.auth.getSession().then(({ data: { session }}) => {
    if (session?.user?.email && $('email')) $('email').value = session.user.email;
  });
}
function showAdmin() {
  $('verifyScreen').style.display = 'none';
  $('loginScreen').style.display = 'none';
  $('adminScreen').style.display = '';
}

$('signInBtn').onclick = async () => {
  const email = $('email').value.trim();
  const password = $('password').value;
  $('err').textContent = '';
  if (!email || !password) { $('err').textContent = 'Email + password required'; return; }
  $('signInBtn').disabled = true;
  $('signInBtn').textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $('signInBtn').disabled = false;
  $('signInBtn').textContent = 'Sign in';
  if (error) { $('err').textContent = error.message; return; }
  const ok = await ensureAdmin();
  if (ok) { showAdmin(); load(); }
};
$('email')?.addEventListener('keypress', e => { if (e.key === 'Enter') $('signInBtn').click(); });
$('password')?.addEventListener('keypress', e => { if (e.key === 'Enter') $('signInBtn').click(); });

$('signOutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };
$('refreshBtn').onclick = () => load();
$('search').addEventListener('input', renderTable);

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = false; }
    renderTable();
  });
});

async function load() {
  $('metaLine').textContent = 'Loading…';
  try {
    const [usersRes, statsRes, packsRes] = await Promise.all([
      sb.rpc('admin_list_users'),
      sb.rpc('admin_stats'),
      sb.from('voice_packs').select('id,name,tier').order('sort_order')
    ]);
    if (usersRes.error) throw usersRes.error;
    if (statsRes.error) throw statsRes.error;
    if (packsRes.error) throw packsRes.error;
    allUsers = usersRes.data || [];
    allPacks = packsRes.data || [];
    renderStats(statsRes.data);
    renderTable();
    if (currentTab === 'audit') loadAudit();
    $('metaLine').textContent = `${allUsers.length} users · refreshed ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    $('metaLine').textContent = 'Error: ' + e.message;
  }
}

async function loadAudit() {
  try {
    const { data, error } = await sb.rpc('admin_recent_audit', { limit_param: 200 });
    if (error) throw error;
    auditLog = data || [];
    renderAudit();
  } catch (e) { $('auditList').textContent = 'Error: ' + e.message; }
}

function renderAudit() {
  const list = $('auditList');
  list.innerHTML = '';
  if (!auditLog.length) {
    list.appendChild(el('div', { class: 'empty', text: 'No audit entries yet.' }));
    return;
  }
  auditLog.forEach(a => {
    const row = el('div', { class: 'audit-row' });
    row.appendChild(el('div', { class: 'a-when', text: new Date(a.created_at).toLocaleString() }));
    const headLine = el('div');
    headLine.appendChild(el('span', { class: 'a-action', text: a.action }));
    headLine.appendChild(document.createTextNode(' by '));
    headLine.appendChild(el('span', { class: 'a-actor', text: a.actor_email || '<deleted>' }));
    if (a.target_id) headLine.appendChild(document.createTextNode(' → ' + (a.target_kind || 'target') + ' ' + a.target_id));
    row.appendChild(headLine);
    if (a.details) row.appendChild(el('div', { class: 'a-details', text: JSON.stringify(a.details) }));
    list.appendChild(row);
  });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    $('tab-users').style.display = currentTab === 'users' ? '' : 'none';
    $('tab-audit').style.display = currentTab === 'audit' ? '' : 'none';
    if (currentTab === 'audit') loadAudit();
  });
});
$('refreshAuditBtn')?.addEventListener('click', loadAudit);

// Manual grant modal
let grantTargetUser = null;
function openGrantModal(user) {
  grantTargetUser = user;
  $('grantTarget').textContent = user.email || user.id;
  const select = $('grantPack');
  select.innerHTML = '';
  allPacks.filter(p => p.tier !== 'free').forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name + ' (' + p.id + ')';
    select.appendChild(opt);
  });
  $('grantModal').classList.add('show');
}
$('grantCancel').onclick = () => $('grantModal').classList.remove('show');
$('grantSubmit').onclick = async () => {
  if (!grantTargetUser) return;
  const packId = $('grantPack').value;
  const source = $('grantSource').value;
  $('grantSubmit').disabled = true;
  $('grantSubmit').textContent = 'Granting…';
  const { error } = await sb.rpc('admin_grant_entitlement', { target_user: grantTargetUser.id, pack_id_param: packId, source_param: source });
  $('grantSubmit').disabled = false;
  $('grantSubmit').textContent = 'Grant';
  if (error) { alert('Error: ' + error.message); return; }
  $('grantModal').classList.remove('show');
  load();
};

async function revokePack(user, packId) {
  if (!confirm('Revoke ' + packId + ' from ' + (user.email || user.id) + '?')) return;
  const { error } = await sb.rpc('admin_revoke_entitlement', { target_user: user.id, pack_id_param: packId });
  if (error) { alert('Error: ' + error.message); return; }
  load();
}

// Edit name
let nameTargetUser = null;
function openNameModal(user) {
  nameTargetUser = user;
  $('nameTarget').textContent = user.email || user.id;
  $('nameFirst').value = user.first_name || '';
  $('nameLast').value  = user.last_name  || '';
  $('nameModal').classList.add('show');
}
$('nameCancel').onclick = () => $('nameModal').classList.remove('show');
$('nameSubmit').onclick = async () => {
  if (!nameTargetUser) return;
  $('nameSubmit').disabled = true;
  $('nameSubmit').textContent = 'Saving…';
  const { error } = await sb.rpc('admin_set_user_name', { target_user: nameTargetUser.id, first: $('nameFirst').value, last: $('nameLast').value });
  $('nameSubmit').disabled = false;
  $('nameSubmit').textContent = 'Save';
  if (error) { alert('Error: ' + error.message); return; }
  $('nameModal').classList.remove('show');
  load();
};

// Reset password — server returns temp password to admin
async function resetPassword(user) {
  if (!confirm('Reset password for ' + (user.email || user.id) + '?\n\nA new temporary password will be generated. The user must change it after signing in.')) return;
  const { data, error } = await sb.rpc('admin_reset_password', { target_user: user.id });
  if (error) { alert('Error: ' + error.message); return; }
  $('resetTarget').textContent = user.email || user.id;
  $('resetPwField').value = data || '';
  $('resetModal').classList.add('show');
}
$('resetClose').onclick = () => $('resetModal').classList.remove('show');
$('resetCopy').onclick = () => {
  $('resetPwField').select();
  try { document.execCommand('copy'); } catch(e){}
  $('resetCopy').textContent = 'Copied ✓';
  setTimeout(() => $('resetCopy').textContent = 'Copy', 1500);
};

async function hardDeleteUser(user) {
  if (!confirm('PERMANENTLY delete ' + (user.email || user.id) + '?\n\nThis cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? Type the email to confirm.')) return;
  const typed = prompt('Type "' + (user.email || user.id) + '" to confirm:');
  if (typed !== (user.email || user.id)) { alert('Mismatch — cancelled.'); return; }
  const { error } = await sb.rpc('admin_hard_delete_user', { target_user: user.id });
  if (error) { alert('Error: ' + error.message); return; }
  load();
}

function renderStats(s) {
  if (!s) return;
  const row = $('statsRow');
  row.innerHTML = '';
  const conv = s.total_users > 0 ? ((s.paid_users / s.total_users) * 100).toFixed(1) : 0;
  const stats = [
    ['Total users', s.total_users, '+' + s.new_24h + ' in last 24h'],
    ['Active 24h', s.active_24h, s.active_7d + ' in last 7d'],
    ['Paid users', s.paid_users, conv + '% conversion'],
    ['Revenue', fmtCents(s.total_revenue_cents), 'excludes manual grants'],
    ['Total time played', fmtTime(s.total_seconds_played), 'across all users']
  ];
  stats.forEach(([label, num, sub]) => {
    row.appendChild(el('div', { class: 'stat' },
      el('div', { class: 'stat-label', text: label }),
      el('div', { class: 'stat-num', text: String(num) }),
      el('div', { class: 'stat-sub', text: sub })
    ));
  });
}

function renderTable() {
  const search = ($('search').value || '').toLowerCase().trim();
  let rows = allUsers.slice();
  if (search) rows = rows.filter(r => (r.email || '').toLowerCase().includes(search));
  rows.sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sorted', 'asc');
    if (th.dataset.sort === sortKey) {
      th.classList.add('sorted');
      if (sortAsc) th.classList.add('asc');
    }
  });

  const tbody = $('userTbody');
  tbody.innerHTML = '';
  rows.forEach(u => {
    const tr = el('tr', { class: 'row-clickable', onclick: () => openDrawer(u) });
    if (u.deleted_at) tr.style.opacity = '0.5';

    tr.appendChild(el('td', { class: 'email', text: u.email || '—' }));

    const fullName = [u.first_name, u.last_name].filter(Boolean).join(' ');
    tr.appendChild(el('td', { text: fullName || '—', class: fullName ? '' : 'dim' }));

    tr.appendChild(el('td', { class: 'dim', title: u.created_at || '', text: fmtRel(u.created_at) }));
    tr.appendChild(el('td', { class: 'dim', title: u.last_active_at || '', text: fmtRel(u.last_active_at) }));
    tr.appendChild(el('td', { text: fmtCents(u.revenue_cents || 0) }));
    tr.appendChild(el('td', { text: String(u.pack_count || 0) }));

    // Status pills
    const statusCell = el('td');
    if (u.is_admin)   statusCell.appendChild(el('span', { class: 'pill admin', text: 'admin' }));
    if (u.deleted_at) statusCell.appendChild(el('span', { class: 'pill', text: 'deleting' }));
    if (!u.is_admin && !u.deleted_at) statusCell.appendChild(el('span', { class: 'dim', text: '—' }));
    tr.appendChild(statusCell);

    tbody.appendChild(tr);
  });

  $('emptyMsg').style.display = rows.length ? 'none' : '';
}

// ===== USER DETAIL DRAWER =====
let drawerUser = null;
function openDrawer(user) {
  drawerUser = user;
  const initial = (user.email || '?').charAt(0).toUpperCase();
  $('drawerAvatar').textContent = initial;
  $('drawerEmail').textContent = user.email || user.id;
  const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
  $('drawerName').textContent = fullName || 'No name set';

  const body = $('drawerBody');
  body.innerHTML = '';

  // Status badges
  if (user.is_admin || user.deleted_at) {
    const statusBox = el('div', { class: 'drawer-section' });
    if (user.is_admin)   statusBox.appendChild(el('span', { class: 'pill admin', text: 'admin' }));
    if (user.deleted_at) statusBox.appendChild(el('span', { class: 'pill', text: 'deletion scheduled ' + fmtRel(user.deletion_scheduled_for) }));
    body.appendChild(statusBox);
  }

  // Stats grid
  const stats = el('div', { class: 'drawer-section' },
    el('div', { class: 'drawer-section-title', text: 'Activity' }),
    el('div', { class: 'stat-grid' },
      statCell('Joined',          fmtRel(user.created_at)),
      statCell('Last active',     fmtRel(user.last_active_at)),
      statCell('Last sign-in',    fmtRel(user.last_sign_in_at)),
      statCell('Logins',          String(user.login_count || 0)),
      statCell('Time played',     fmtTime(user.total_seconds || 0)),
      statCell('Best time',       user.best_time_seconds != null ? Number(user.best_time_seconds).toFixed(1) + 's' : '—'),
      statCell('Badges',          String(user.badges_count || 0)),
      statCell('Spent',           fmtCents(user.revenue_cents || 0))
    )
  );
  body.appendChild(stats);

  // Owned packs
  const packsSection = el('div', { class: 'drawer-section' },
    el('div', { class: 'drawer-section-title', text: 'Voice packs' })
  );
  const packRows = el('div', { class: 'pack-rows' });
  if (user.entitlements && user.entitlements.length) {
    user.entitlements.forEach(eid => {
      const meta = allPacks.find(p => p.id === eid);
      const row = el('div', { class: 'pack-row' });
      row.appendChild(el('span', { class: 'name', text: (meta?.name || eid) + (meta ? '' : ' (' + eid + ')') }));
      row.appendChild(el('button', {
        onclick: async () => {
          if (!confirm('Revoke ' + eid + '?')) return;
          const { error } = await sb.rpc('admin_revoke_entitlement', { target_user: user.id, pack_id_param: eid });
          if (error) return alert('Error: ' + error.message);
          await load(); reopenDrawerForCurrent();
        },
        text: 'Revoke',
        style: 'padding:4px 10px;font-size:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:6px;cursor:pointer;font-family:inherit'
      }));
      packRows.appendChild(row);
    });
  } else {
    packRows.appendChild(el('div', { class: 'dim', text: 'No packs yet', style: 'padding:6px 0;font-size:12px' }));
  }
  packsSection.appendChild(packRows);

  // Grant a pack
  const grantRow = el('div', { class: 'grant-row' });
  const select = el('select');
  allPacks.filter(p => p.tier !== 'free').forEach(p => {
    if (user.entitlements && user.entitlements.includes(p.id)) return; // already owns
    const opt = el('option', { value: p.id, text: p.name + ' ($' + ((p.price_cents||0)/100).toFixed(2) + ')' });
    select.appendChild(opt);
  });
  grantRow.appendChild(select);
  grantRow.appendChild(el('button', {
    text: 'Grant',
    onclick: async () => {
      if (!select.value) return;
      const { error } = await sb.rpc('admin_grant_entitlement', { target_user: user.id, pack_id_param: select.value, source_param: 'manual' });
      if (error) return alert('Error: ' + error.message);
      await load(); reopenDrawerForCurrent();
    }
  }));
  packsSection.appendChild(grantRow);
  body.appendChild(packsSection);

  // Account actions
  const actSection = el('div', { class: 'drawer-section' },
    el('div', { class: 'drawer-section-title', text: 'Account actions' })
  );
  const actBtns = el('div', { class: 'action-btns' });
  actBtns.appendChild(el('button', { text: 'Edit name', onclick: () => openNameModal(user) }));
  actBtns.appendChild(el('button', { text: 'Reset password', onclick: () => resetPassword(user) }));
  if (!user.is_admin) {
    actBtns.appendChild(el('button', { class: 'danger', text: 'Delete account', onclick: () => hardDeleteUser(user) }));
  }
  actSection.appendChild(actBtns);
  body.appendChild(actSection);

  // IDs at bottom (for support)
  body.appendChild(el('div', { class: 'drawer-section' },
    el('div', { class: 'drawer-section-title', text: 'Identifiers' }),
    el('div', { style: 'font-size:11px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Consolas,monospace;word-break:break-all' },
      'id: ' + user.id,
      el('br'),
      'user-agent: ' + (user.user_agent || '—')
    )
  ));

  $('drawer').classList.add('show');
  $('drawerBack').classList.add('show');
}

function reopenDrawerForCurrent() {
  if (!drawerUser) return;
  const fresh = allUsers.find(u => u.id === drawerUser.id);
  if (fresh) openDrawer(fresh);
}

function statCell(label, value) {
  return el('div', { class: 'stat-cell' },
    el('div', { class: 'l', text: label }),
    el('div', { class: 'v', text: value })
  );
}

$('drawerClose').onclick = () => closeDrawer();
$('drawerBack').onclick = () => closeDrawer();
function closeDrawer() {
  drawerUser = null;
  $('drawer').classList.remove('show');
  $('drawerBack').classList.remove('show');
}

(async () => {
  const ok = await ensureAdmin();
  if (ok) { showAdmin(); load(); setInterval(load, 30000); }
  else showLogin();
})();
</script>
